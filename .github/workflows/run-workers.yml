name: Run workers (cron)

on:
  schedule:
    # GitHub Actions schedule is not guaranteed to be exact; 5-min is the practical minimum.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/internal/run-workers
        env:
          RUN_WORKERS_URL: ${{ secrets.RUN_WORKERS_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RUN_WORKERS_URL" ]; then
            echo "Missing RUN_WORKERS_URL secret" >&2
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret" >&2
            exit 1
          fi

          curl -sS -X POST "$RUN_WORKERS_URL" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json" \
            --data '{}' \
            --fail

